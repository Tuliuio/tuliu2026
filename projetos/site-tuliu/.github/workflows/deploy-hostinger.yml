name: Deploy para Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Instalar dependências
      run: |
        cd projetos/site-tuliu/tuliu-app
        npm ci

    - name: Build da aplicação
      run: |
        cd projetos/site-tuliu/tuliu-app
        npm run build

    - name: Preparar arquivos para deploy
      run: |
        # Copiar .htaccess para dist
        cp projetos/site-tuliu/.htaccess projetos/site-tuliu/tuliu-app/dist/
        # Listar arquivos
        echo "📦 Arquivos para deploy:"
        ls -lh projetos/site-tuliu/tuliu-app/dist/ | head -20

    - name: Deploy para Hostinger
      uses: SamKirkland/FTP-Deploy-Action@4.3.4
      with:
        server: ${{ secrets.HOSTINGER_SERVER }}
        username: ${{ secrets.HOSTINGER_USERNAME }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        local-dir: ./projetos/site-tuliu/tuliu-app/dist/
        server-dir: /

    - name: Verificar Deploy
      if: success()
      run: |
        echo "✅ Deploy concluído com sucesso!"
        echo "🔗 Site ao vivo em: https://tuliu.io"
        echo "📊 Verifique em alguns minutos para propagação"

    - name: Notificar falha
      if: failure()
      run: |
        echo "❌ Deploy falhou!"
        echo "Verifique as credenciais de FTP/SFTP no GitHub Secrets"
