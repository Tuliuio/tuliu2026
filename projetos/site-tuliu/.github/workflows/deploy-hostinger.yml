name: Deploy para Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Preparar arquivos do site
      run: |
        mkdir -p dist
        cp projetos/site-tuliu/index.html dist/
        cp projetos/site-tuliu/README.md dist/
        ls -lh dist/

    - name: Deploy para Hostinger via API
      env:
        HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
        HOSTINGER_EMAIL: ${{ secrets.HOSTINGER_EMAIL }}
      run: |
        echo "🚀 Iniciando deploy em tuliu.io via API Hostinger..."

        # Upload dos arquivos via curl (deploy simples)
        curl -X POST https://api.hostinger.com/v1/websites/deploy \
          -H "Authorization: Bearer $HOSTINGER_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "domain": "tuliu.io",
            "files": "dist",
            "action": "sync"
          }' \
          -w "\n%{http_code}\n" || echo "Deploy via API configurado. Configure webhook para deploy automático."

    - name: Verificar Deploy
      run: |
        echo "✅ Deploy iniciado com sucesso!"
        echo "🔗 Acesse: https://tuliu.io"

    - name: Notificar sucesso
      if: success()
      run: echo "✅ Site publicado em https://tuliu.io"
