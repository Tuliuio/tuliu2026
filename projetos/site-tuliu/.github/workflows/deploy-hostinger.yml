name: Deploy para Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Deploy para Hostinger via SFTP
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        REMOTE_HOST: ${{ secrets.HOSTINGER_HOST }}
        REMOTE_USER: ${{ secrets.HOSTINGER_USER }}
        TARGET: /home/${{ secrets.HOSTINGER_USER }}/public_html/
        ARGS: "-rlvz --delete"
        SCRIPT_BEFORE: |
          echo "Iniciando deploy para tuliu.io..."
        SCRIPT_AFTER: |
          echo "✅ Deploy concluído com sucesso em tuliu.io!"
